# Application name
spring.application.name=VaultKeeper

# ===== Server Configuration =====
server.port=8080

# ===== MySQL Database Configuration =====
spring.datasource.url=jdbc:mysql://localhost:3306/vaultkeeper?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Thymeleaf Configuration =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===== Session Configuration =====
server.servlet.session.timeout=1800
server.servlet.session.tracking-modes=COOKIE

# ===== HTTP Cookies - HttpOnly & Secure Flags =====
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.name=VAULTKEEPER_SESSION

# ===== Security Configuration =====
spring.security.bcrypt.strength=10

# ===== Logging Configuration =====
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.vaultkeeper=DEBUG

# ===== Error Pages =====
server.error.path=/error
server.error.whitelabel.enabled=false

# ===== Static Resources =====
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

